name: FlowBoard online update
on:
  push:
    paths:
      - .github/workflows/flowboard-online-update-202605141930.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply FlowBoard patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d > /tmp/flowboard.patch <<'PATCH_B64'
          
          PATCH_B64
          git apply --whitespace=nowarn /tmp/flowboard.patch
          rm .github/workflows/flowboard-online-update-202605141930.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A README.md app.js index.html styles.css .github/workflows/flowboard-online-update-202605141930.yml
          git commit -m 'Update FlowBoard app'
          git push
